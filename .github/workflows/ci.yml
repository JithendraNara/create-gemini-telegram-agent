name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  package-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check CLI syntax
        run: npm run check
      - name: Dry-run package
        run: npm run pack:dry-run

  python-template-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile template bot
        run: python -m py_compile templates/project/bot.py
